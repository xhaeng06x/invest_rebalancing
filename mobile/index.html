<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#07071a">
  <meta name="description" content="자산배분 리밸런싱 모바일 앱 - 주식, 채권, 금 포트폴리오 관리">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>자산배분 리밸런서</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1>💰 <span>자산배분 리밸런서</span></h1>
  </header>

  <main>
    <div id="tab-dashboard" class="tab-panel active"></div>
    <div id="tab-input" class="tab-panel"></div>
    <div id="tab-rebal" class="tab-panel"></div>
    <div id="tab-chart" class="tab-panel"></div>
    <div id="tab-settings" class="tab-panel"></div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="dashboard" onclick="switchTab('dashboard')"><span class="icon">🏠</span>홈</button>
    <button class="nav-item" data-tab="input" onclick="switchTab('input')"><span class="icon">✏️</span>입력</button>
    <button class="nav-item" data-tab="rebal" onclick="switchTab('rebal')"><span class="icon">⚖️</span>리밸런싱</button>
    <button class="nav-item" data-tab="chart" onclick="switchTab('chart')"><span class="icon">📊</span>차트</button>
    <button class="nav-item" data-tab="settings" onclick="switchTab('settings')"><span class="icon">⚙️</span>설정</button>
  </nav>

  <script src="app.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</body>
</html>
